        /* ШАПКА */

            padding: 40px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        .header-container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            gap: 20px;
        }

        /* ГРУППА ТЕКСТА */
        .title-group {
            display: flex;
            flex-direction: column;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .kokshetau-label {
            font-size: 1.4em;
            color: var(--accent-gold);
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .program-label {
            font-size: 0.8em;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 2px 12px;
            border-radius: 4px;
            margin-top: 10px;
            display: inline-block;
            width: fit-content;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* РОБОТ */
        .robot-photo {
            width: 110px; 
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* НИЖНИЙ БАННЕР (ПОД РОБОТОМ И ТЕКСТОМ) */
        .bottom-banner {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-top: 25px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.58em;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.5;
            text-transform: uppercase;
        }

        /* Навигация и Контент */
        .lang-switch {
            position: relative;
            z-index: 2;
            margin-top: 20px;
        }

        .lang-switch button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid white;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .lang-switch button.active {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
        }

        .date-nav {
            display: flex;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .date-nav button {
            padding: 15px 20px;
            border: none;
            background: none;
            font-weight: bold;
            color: #666;
            white-space: nowrap;
        }

        .date-nav button.active {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--primary-blue);
        }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .event-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 5px solid var(--primary-blue);
        }
        .time { font-weight: bold; color: var(--primary-blue); }
        .location { color: #d9534f; font-size: 0.9em; margin-top: 5px; }

</head>

    let currentLang = 'ru';
    let currentDayIdx = 0;

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        renderTabs();
        renderContent();
    }

    function renderTabs() {
        const nav = document.getElementById('date-tabs');
        nav.innerHTML = '';
        scheduleData[currentLang].days.forEach((day, idx) => {
            const btn = document.createElement('button');
            btn.innerText = day.date;
            if(idx === currentDayIdx) btn.className = 'active';
            btn.onclick = () => { currentDayIdx = idx; renderTabs(); renderContent(); };
            nav.appendChild(btn);
        });
    }

    function renderContent() {
        const container = document.getElementById('schedule-content');
        const dayData = scheduleData[currentLang].days[currentDayIdx];
        container.innerHTML = `<h3>${dayData.date} (Код: ${dayData.code})</h3>`;
        
        dayData.events.forEach(ev => {
            const locText = ev.loc.trim();
            
            // Проверяем, есть ли этот адрес в нашем словаре
            // Если есть — берем готовую ссылку, если нет — оставляем просто текст
            const manualUrl = addressLinks[locText];

            const locationHTML = manualUrl 
                ? `<a href="${manualUrl}" target="_blank" style="text-decoration:none; color:inherit; display:block;">📍 ${locText}</a>`
                : `📍 ${locText}`;

            container.innerHTML += `
                <div class="event-card">
                    <span class="time">${ev.time}</span>
                    <div class="title">${ev.title}</div>
                    <div class="location">${locationHTML}</div>
                </div>`;
        });
    }

    renderTabs();
    renderContent();
</script>
